<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoable - Aesthetic Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink-light: #fce4ec;
            --pink-dark: #f06292;
            --pink-text: #ff80ab;
            --btn-re-take: #f8bbd0;
            --btn-download: #f48fb1;
            --btn-new-photo: #ffab91;
        }

        body {
            background-color: var(--pink-light);
            font-family: 'Fredoka One', cursive;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            position: relative;
        }

        /* --- DEKORASI STIKER --- */
        .decor-flower { position: absolute; top: 20px; left: 20px; width: 120px; opacity: 0.8; z-index: -1; }
        .decor-wave { position: absolute; top: 0; right: 0; width: 350px; opacity: 0.7; z-index: -1; }
        
        /* BERUANG REQUEST: LEFT 0 & 800PX */
        .bear-container { 
            position: absolute; 
            bottom: -80px; 
            left: 0; 
            width: 800px; 
            z-index: 10; 
            pointer-events: none; 
        }
        .bear-image { width: 100%; height: auto; mix-blend-mode: multiply; }

        /* --- NAVIGATION BAR --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 60px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px); }
        nav a { text-decoration: none; color: white; font-size: 18px; }
        nav .logo-nadya { font-family: 'Pacifico', cursive; color: white; font-size: 24px; }

        /* --- PAGES --- */
        .page { display: none; width: 100%; height: calc(100vh - 80px); flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }

        /* HAL 1: LANDING */
        #hal1 h1 { font-size: 120px; color: var(--pink-text); text-shadow: 6px 6px white; margin: 0; }
        .btn-start-main { background-color: var(--pink-text); color: white; font-size: 26px; padding: 18px 60px; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #d81b60; margin-top: 40px; position: relative; z-index: 20; }

        /* HAL 2: PILIH FRAME */
        .frame-grid { display: flex; gap: 25px; position: relative; z-index: 20; }
        .frame-item { width: 150px; height: 380px; border: 6px solid white; border-radius: 12px; cursor: pointer; background-size: cover; background-position: center; mix-blend-mode: multiply; }

        /* HAL 3: PHOTO BOOTH */
        .booth-container { display: flex; gap: 40px; align-items: center; position: relative; z-index: 20; }
        .result-section h2 { font-size: 32px; color: var(--pink-dark); margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-columns: 140px; gap: 15px; } /* Satu kolom untuk 3 foto */
        .photo-box { width: 140px; height: 95px; border: 3px solid white; border-radius: 6px; overflow: hidden; background: #ddd; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .timer-indicator { background-color: #ff5252; color: white; padding: 8px 30px; border-radius: 15px; margin-bottom: 20px; font-size: 26px; min-width: 100px;}
        .screen-black { width: 500px; height: 350px; background: black; border-radius: 25px; overflow: hidden; border: 8px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn-capture { background-color: #00c853; color: white; font-size: 18px; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 0px #1b5e20; margin-top: 25px; font-family: 'Fredoka One'; }
        .btn-next-step { background-color: #2196F3 !important; box-shadow: 0 5px 0px #0d47a1 !important; }

        /* HAL 4: HASIL (LINE 102) */
        #hal4 h1 { font-size: 40px; color: #333; margin-bottom: 15px; }
        #result-photo-strip { 
            height: 520px; /* Batasi tinggi agar tidak memotong tombol di browsermu */
            width: auto;
            border-radius: 10px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
            margin-bottom: 15px; 
            border: 4px solid white; 
        }
        .action-grid h3 { font-size: 20px; color: #555; margin: 5px 0; font-weight: normal; }
        .btn-action-container { display: flex; gap: 15px; margin-top: 15px; }
        .btn-action { padding: 12px 25px; border-radius: 50px; border: none; font-size: 15px; cursor: pointer; font-family: 'Fredoka One'; color: #333; }
        #btn-re-take { background-color: var(--btn-re-take); }
        #btn-download { background-color: var(--btn-download); color: white; }
        #btn-new-photo { background-color: var(--btn-new-photo); }
        .warning-text { font-size: 12px; color: #888; margin-top: 15px; max-width: 500px; font-family: sans-serif; }

        canvas { display: none; }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/L6M0X9Y/flower.png" class="decor-flower">
    <img src="https://i.ibb.co/m9XFjP0/pink-wave.png" class="decor-wave">

    <div class="bear-container">
        <img src="6.png" id="bear-img" class="bear-image">
    </div>

    <nav>
        <a href="#">About me!</a>
        <span class="logo-nadya">nadya</span>
        <a href="#">what I need to add?</a>
    </nav>

    <div id="hal1" class="page active">
        <h1>Photoable</h1>
        <button class="btn-start-main" onclick="goToHal2()">Start photo</button>
    </div>

    <div id="hal2" class="page">
        <h2>choose here!</h2>
        <div class="frame-grid">
            <div class="frame-item" style="background-image: url('1.png');" onclick="startBooth('1.png')"></div>
            <div class="frame-item" style="background-image: url('2.png');" onclick="startBooth('2.png')"></div>
            <div class="frame-item" style="background-image: url('3.png');" onclick="startBooth('3.png')"></div>
            <div class="frame-item" style="background-image: url('4.png');" onclick="startBooth('4.png')"></div>
        </div>
    </div>

    <div id="hal3" class="page">
        <div class="booth-container">
            <div class="result-section">
                <h2>Result!</h2>
                <div class="photo-grid">
                    <div id="res-0" class="photo-box"></div>
                    <div id="res-1" class="photo-box"></div>
                    <div id="res-2" class="photo-box"></div>
                </div>
            </div>
            <div class="camera-section">
                <div id="timer" class="timer-indicator">READY?</div>
                <div class="screen-black"><video id="video" autoplay playsinline></video></div>
                <button id="captureBtn" class="btn-capture">Click here to start!</button>
            </div>
        </div>
    </div>

    <div id="hal4" class="page">
        <h1>You look perfect at this photo!</h1>
        <img id="result-photo-strip" src="" alt="Perfect Photo Strip">
        <div class="action-grid">
            <h3>wanna download it? or retake?</h3>
            <div class="btn-action-container">
                <button id="btn-re-take" class="btn-action" onclick="goToHal3()">Re-take</button>
                <button id="btn-download" class="btn-action" onclick="downloadPhotoStrip()">Download</button>
                <button id="btn-new-photo" class="btn-action" onclick="goToHal2()">Take new photo</button>
            </div>
        </div>
        <p class="warning-text">*If you wanna take another pictures please download it first, cause if you dont download it first you will losing this cute photo</p>
    </div>

    <canvas id="canvas" width="640" height="480"></canvas>
    <canvas id="mainCanvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const bearImg = document.getElementById('bear-img');
        const timerDisplay = document.getElementById('timer');
        const captureBtn = document.getElementById('captureBtn');
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const userPhotos = []; // Menyimpan data gambar user
        let selectedFrame = '';
        let isDone = false;

        function goToHal2() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('hal2').classList.add('active');
            bearImg.src = '7.png'; 
        }

        function startBooth(frame) {
            selectedFrame = frame;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('hal3').classList.add('active');
            bearImg.src = '5.png'; 
            initCamera();
        }

        function goToHal3() {
            userPhotos.length = 0;
            isDone = false;
            for(let i=0; i<3; i++) document.getElementById(`res-${i}`).innerHTML = '';
            captureBtn.innerText = "Click here to start!";
            captureBtn.classList.remove('btn-next-step');
            captureBtn.style.display = 'block';
            timerDisplay.innerText = "READY?";
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('hal3').classList.add('active');
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera tidak bisa diakses!");
            }
        }

        function takePhoto(index) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;
            tempCanvas.height = 480;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.save();
            tCtx.translate(640, 0);
            tCtx.scale(-1, 1);
            tCtx.drawImage(video, 0, 0, 640, 480);
            tCtx.restore();
            
            const data = tempCanvas.toDataURL('image/png');
            userPhotos.push(data);
            const img = document.createElement('img');
            img.src = data;
            document.getElementById(`res-${index}`).innerHTML = '';
            document.getElementById(`res-${index}`).appendChild(img);
        }

        captureBtn.onclick = () => {
            if (isDone) {
                generatePhotoStrip(); // Panggil fungsi gabung gambar
                return;
            }
            captureBtn.style.display = 'none';
            let count = 0;
            const cycle = () => {
                if (count < 3) {
                    let time = 5;
                    timerDisplay.innerText = time;
                    const cd = setInterval(() => {
                        time--;
                        if (time > 0) timerDisplay.innerText = time;
                        else {
                            clearInterval(cd);
                            timerDisplay.innerText = "📸";
                            takePhoto(count);
                            count++;
                            setTimeout(cycle, 1000);
                        }
                    }, 1000);
                } else {
                    timerDisplay.innerText = "DONE!";
                    isDone = true;
                    captureBtn.innerText = "Next";
                    captureBtn.classList.add('btn-next-step');
                    captureBtn.style.display = 'block';
                }
            };
            cycle();
        };

        // --- FUNGSI GABUNG FOTO TERBAIK ---
        function generatePhotoStrip() {
            const frameImg = new Image();
            frameImg.src = selectedFrame;
            
            frameImg.onload = () => {
                // Set ukuran canvas sesuai ukuran asli frame kamu (bukan ukuran gepeng di layar)
                mainCanvas.width = frameImg.width;
                mainCanvas.height = frameImg.height;

                // 1. Gambar semua foto user dulu (di bawah)
                // Kita membagi tinggi frame menjadi 3 bagian untuk posisi foto
                let loadedCount = 0;
                userPhotos.forEach((data, i) => {
                    const img = new Image();
                    img.src = data;
                    img.onload = () => {
                        // LOGIKA ANTI GEPENG (Cover Mode)
                        // Tentukan area target foto di frame
                        const slotHeight = mainCanvas.height / 3;
                        const targetW = mainCanvas.width * 0.85; // Sedikit border kiri kanan
                        const targetH = slotHeight * 0.75;
                        const targetX = (mainCanvas.width - targetW) / 2;
                        const targetY = (slotHeight * i) + (slotHeight - targetH) / 2;

                        // Hitung perbandingan agar foto tidak gepeng
                        const imgRatio = img.width / img.height;
                        const targetRatio = targetW / targetH;
                        let sX, sY, sW, sH;

                        if (imgRatio > targetRatio) {
                            // Foto kamera lebih lebar
                            sH = img.height;
                            sW = img.height * targetRatio;
                            sX = (img.width - sW) / 2;
                            sY = 0;
                        } else {
                            // Foto lubang frame lebih lebar
                            sW = img.width;
                            sH = img.width / targetRatio;
                            sX = 0;
                            sY = (img.height - sH) / 2;
                        }

                        // Gambar foto (sX, sY, sW, sH) ke target (targetX, targetY, targetW, targetH)
                        ctx.drawImage(img, sX, sY, sW, sH, targetX, targetY, targetW, targetH);
                        loadedCount++;

                        // 2. SETELAH SEMUA FOTO DIGAMBAR, BARU TIMPA DENGAN FRAME
                        if (loadedCount === 3) {
                            // Teknik tumpuk: Frame di atas foto bolong
                            ctx.drawImage(frameImg, 0, 0, mainCanvas.width, mainCanvas.height);
                            
                            // Ambil hasil photo strip dan tampilkan
                            document.getElementById('result-photo-strip').src = mainCanvas.toDataURL('image/png');
                            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                            document.getElementById('hal4').classList.add('active');
                        }
                    };
                });
            };
        }

        function downloadPhotoStrip() {
            const link = document.createElement('a');
            link.download = 'My_Photoable.png';
            link.href = document.getElementById('result-photo-strip').src;
            link.click();
        }
    </script>
</body>
</html>
